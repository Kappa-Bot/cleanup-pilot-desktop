name: Bug report
description: Report a runtime bug, regression, or broken workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, with paths or feature area if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Home
        - Cleaner
        - Optimize
        - Vault
        - Shared shell
        - Build / CI
  - type: textarea
    id: validation
    attributes:
      label: Validation already performed
      description: Mention `typecheck`, `test`, `build`, screenshots, logs, or fixture data used.
